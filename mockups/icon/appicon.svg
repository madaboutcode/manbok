      <path d="M39.4,35.4c0.2-1,0.2-2,0-3.1c-0.7-4-4.3-7-8.3-7c-0.5,0-0.9,0-1.4,0.1c-4.1,0.7-7.1,4.2-7.1,8.3 c0,1.8,0,3.8,0,5.9c0,1,0.4,2,1.1,2.8c0.8,0.9,1.9,1.4,3.3,1.5c0.5,0,1,0.3,1.2,0.6c0.5,0.6,0.5,1.4,0.2,2.2c-0.2,0.6-0.8,1-1.6,1 c-0.7,0-1.3,0.7-1.3,1.4c0,0.7,0.7,1.3,1.4,1.3H27c1.1,0,2.1-0.4,2.9-1.2c1.4-1.4,1.8-3.1,1.2-5.3c-0.5-1.7-2.1-2.9-4-3 c-1.1,0-1.7-0.7-1.7-1.8c0-0.7,0-1.3,0-2v-1.6c0-0.6,0-1.2,0-1.8c0-3,2.2-5.5,5.1-5.8c3-0.3,5.8,1.9,6.2,4.8c0.1,0.5,0,1,0,1.5 c0,0.2,0,0.4,0,0.6c0,0.8,0.5,1.4,1.2,1.4C38.6,36.6,39.3,36.1,39.4,35.4z"/>
    </g>
  </g>
</svg>
