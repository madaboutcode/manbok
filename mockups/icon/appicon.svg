<!-- manbok app icon — ear artwork by the project owner, composition MIT with the project.
     Ear path data copied verbatim from mockups/icon/manbok-menubar-icon-watching.svg
     (the project owner's original artwork) — do not redraw or re-trace the ear.
     Composition (squircle, rings, glow) is new, built from the ListenGlyph motif in
     Sources/ManbokApp/Views/EmptyStateView.swift and Theme.swift color tokens. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Theme.bgPanelTop -> Theme.bgPanel, vertical panel gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241D15"/>
      <stop offset="0.55" stop-color="#1B1611"/>
      <stop offset="1" stop-color="#14100C"/>
    </linearGradient>
    <!-- faint tungsten glow bleeding from the top, echoes PanelBackgroundView -->
    <radialGradient id="topGlow" cx="50%" cy="6%" r="60%">
      <stop offset="0" stop-color="#E0A951" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#E0A951" stop-opacity="0"/>
    </radialGradient>
    <!-- edge vignette -->
    <radialGradient id="vignette" cx="50%" cy="52%" r="62%">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.30"/>
    </radialGradient>
    <!-- glowing amber core -->
    <radialGradient id="coreGlow" cx="42%" cy="36%" r="65%">
      <stop offset="0" stop-color="#FFD9A0" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#FFB84D" stop-opacity="0.75"/>
      <stop offset="0.75" stop-color="#E0A951" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#E0A951" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="squircle">
      <rect x="100" y="100" width="824" height="824" rx="185" ry="185"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <rect x="100" y="100" width="824" height="824" fill="url(#bg)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#topGlow)"/>

    <!-- three concentric amber rings, scaled up from ListenGlyph (108/88/68 @ UI scale) -->
    <g fill="none" stroke="#E0A951">
      <circle cx="512" cy="512" r="330" stroke-opacity="0.15" stroke-width="7"/>
      <circle cx="512" cy="512" r="270" stroke-opacity="0.28" stroke-width="8"/>
      <circle cx="512" cy="512" r="208" stroke-opacity="0.45" stroke-width="9"/>
    </g>

    <rect x="100" y="100" width="824" height="824" fill="url(#vignette)"/>

    <!-- glowing core -->
    <circle cx="512" cy="512" r="200" fill="url(#coreGlow)"/>
    <circle cx="512" cy="512" r="152" fill="#241C13" fill-opacity="0.55"/>
    <circle cx="512" cy="512" r="152" fill="none" stroke="#FFB84D" stroke-opacity="0.55" stroke-width="5"/>

    <!-- the owner's ear artwork, path data copied verbatim from
         mockups/icon/manbok-menubar-icon-watching.svg (viewBox 0 0 72 72) -->
    <g transform="translate(311.8,259.9) scale(6.335)" fill="#E0A951">
