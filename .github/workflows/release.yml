name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Validate tag matches Version.swift
        run: |
          grep -q "let appVersion = \"$VERSION\"" Sources/upil-appa/Version.swift || \
            (echo "Tag $GITHUB_REF_NAME doesn't match Version.swift" && exit 1)

      - name: Test
        run: swift test

      - name: Build release
        run: swift build -c release

      - name: Create tarball
        run: tar -czf upil-appa-${VERSION}-macos-arm64.tar.gz -C .build/release upil-appa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          files: upil-appa-${{ env.VERSION }}-macos-arm64.tar.gz
          make_latest: true
