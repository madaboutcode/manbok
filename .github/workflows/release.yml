name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Validate tag matches Version.swift
        run: |
          grep -q "let appVersion = \"$VERSION\"" Sources/manbok/Version.swift || \
            (echo "Tag $GITHUB_REF_NAME doesn't match Version.swift" && exit 1)

      - name: Test
        run: swift test

      - name: Build release
        run: swift build -c release

      - name: Create tarball
        run: tar -czf manbok-${VERSION}-macos-arm64.tar.gz -C .build/release manbok

      - name: Build app product
        run: swift build -c release --product ManbokApp

      - name: Assemble app bundle
        run: scripts/assemble-app.sh .build release "$VERSION"

      - name: Zip app bundle
        run: ditto -c -k --keepParent .build/Manbok.app Manbok-${VERSION}-macos-arm64.zip

      - name: Write release notes
        run: |
          cat > release-notes.md <<EOF
          ## Install

          Download \`Manbok-${VERSION}-macos-arm64.zip\` and unzip. The app is ad-hoc signed, not notarized — macOS will warn on first open. To open it anyway:
          - Right-click the app → Open, or
          - System Settings → Privacy & Security → "Open Anyway", or
          - \`xattr -d com.apple.quarantine ~/Downloads/Manbok.app\`

          Building from source (\`make install-app\`) avoids this entirely.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref }}
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            manbok-${{ env.VERSION }}-macos-arm64.tar.gz
            Manbok-${{ env.VERSION }}-macos-arm64.zip
          make_latest: true
